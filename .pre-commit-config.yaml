# ScrapAI Pre-commit Configuration
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

# Use local tools (already installed) for speed
repos:
  # Code formatting (local - fast)
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: system
        types: [python]
        args: [--line-length=100]

      - id: isort
        name: isort
        entry: isort
        language: system
        types: [python]
        args: [--profile=black, --line-length=100]

      - id: flake8
        name: flake8
        entry: flake8 --max-line-length=100 --extend-ignore=E203,W503
        language: system
        types: [python]
        exclude: ^(alembic/|tests/fixtures/)

      - id: bandit
        name: bandit
        entry: bandit
        language: system
        types: [python]
        args: [-r, -ll, --skip=B104,B105,B106,B107,B108,B601]
        files: ^(core|cli|api|services|handlers|utils)/

  # General checks (fast)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key

# CI configuration
ci:
  autofix_commit_msg: "[pre-commit.ci] auto fixes"
  autofix_prs: true
